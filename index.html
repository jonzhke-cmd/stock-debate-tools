<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Debate — 6 Analysts, Any Ticker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0d0f;--card:#13161a;--card2:#1a1f26;--border:#1e2630;--border2:#2a3545;--text:#e8edf2;--text2:#7b8799;--accent:#e8001c;--accent2:#ff6b35;--green:#00c853;--greenBg:#00c85312;--red:#e8001c;--redBg:#e8001c12;--yellow:#ffd600;--yellowBg:#ffd60012;--blue:#2979ff;--blueBg:#2979ff12;--gradient:linear-gradient(135deg,#e8001c,#ff6b35)}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
.container{max-width:800px;width:100%}
.header{text-align:center;margin-bottom:2.5rem}
.header h1{font-size:2.8rem;font-weight:900;letter-spacing:-1px;line-height:1}
.header h1 .g{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header h1 .w{color:var(--text)}
.header .sub{color:var(--text2);font-size:0.9rem;margin-top:0.4rem;font-weight:300}
.header .sub .badge{display:inline-block;background:var(--card2);border:1px solid var(--border);padding:2px 10px;border-radius:4px;font-size:0.65rem;font-weight:600;color:var(--text2);font-family:'Space Mono',monospace;margin-left:4px}
.search-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1rem}
.search-box{display:flex;gap:10px}
.search-box .iw{flex:1;position:relative}
.search-box .iw .ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1rem;color:var(--text2)}
.search-box input{width:100%;padding:14px 14px 14px 42px;background:var(--bg);border:2px solid var(--border);border-radius:10px;color:var(--text);font-size:1.1rem;font-weight:700;font-family:'Space Mono',monospace;text-transform:uppercase;transition:all 0.2s}
.search-box input:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px var(--redBg)}
.search-box input::placeholder{color:var(--text2);opacity:0.35;font-weight:400}
.search-box button{padding:14px 28px;background:var(--gradient);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:0.95rem;transition:all 0.25s;white-space:nowrap;font-family:'Inter',sans-serif}
.search-box button:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(232,0,28,0.35)}
.search-box button:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}
.quick-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:2rem;justify-content:center}
.quick-pill{display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:100px;color:var(--text2);cursor:pointer;font-size:0.82rem;font-weight:600;transition:all 0.2s;font-family:'Inter',sans-serif}
.quick-pill:hover{border-color:var(--accent);color:var(--accent);background:var(--redBg);transform:translateY(-1px)}
.quick-pill .d{width:5px;height:5px;border-radius:50%;display:inline-block}
.loading{display:none;text-align:center;padding:3rem}
.loading.active{display:block}
.loading .lb{width:200px;height:3px;background:var(--card2);border-radius:3px;margin:1rem auto;overflow:hidden}
.loading .lb .f{width:40%;height:100%;background:var(--gradient);border-radius:3px;animation:ls 1s ease-in-out infinite}
@keyframes ls{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
.loading .t{color:var(--text2);font-size:0.85rem;font-weight:300}
.result{display:none}
.result.active{display:block;animation:fu 0.4s ease}
@keyframes fu{0%{opacity:0;transform:translateY(15px)}100%{opacity:1;transform:translateY(0)}}
.th{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem 2rem;margin-bottom:1rem}
.th-t{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap}
.th-l{flex:1}
.th-tk{font-size:1.8rem;font-weight:800;display:flex;align-items:center;gap:8px}
.th-tk .m{font-size:0.65rem;background:var(--card2);border:1px solid var(--border);padding:3px 10px;border-radius:100px;font-weight:600;color:var(--text2)}
.th-d{color:var(--text2);font-size:0.8rem;font-weight:300;margin-top:2px}
.th-p{text-align:right}
.th-p .pv{font-size:2.8rem;font-weight:900;letter-spacing:-2px;line-height:1}
.th-p .ch{font-size:0.9rem;font-weight:600;display:flex;align-items:center;gap:4px;justify-content:flex-end;margin-top:2px}
.th-p .ch.up{color:var(--green)}.th-p .ch.down{color:var(--red)}
.th-m{display:flex;gap:8px;flex-wrap:wrap;margin-top:0.8rem;padding-top:0.8rem;border-top:1px solid var(--border)}
.th-mi{font-size:0.73rem;color:var(--text2);display:flex;align-items:center;gap:4px}
.th-mi strong{color:var(--text);font-weight:600}
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.mc{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;text-align:center;transition:all 0.2s}
.mc:hover{border-color:var(--border2);transform:translateY(-1px)}
.mc .ml{font-size:0.65rem;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.mc .mv{font-size:1rem;font-weight:700;margin-top:3px;font-family:'Space Mono',monospace}
.mc .mv.g{color:var(--green)}.mc .mv.r{color:var(--red)}.mc .mv.y{color:var(--yellow)}
.bb{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.bb-item{padding:12px 14px;border-radius:10px;font-size:0.8rem;line-height:1.5}
.bb-item.bull{background:var(--greenBg);border:1px solid rgba(0,200,83,0.12)}
.bb-item.bear{background:var(--redBg);border:1px solid rgba(232,0,28,0.12)}
.bb-item .bl{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.bb-item.bull .bl{color:var(--green)}.bb-item.bear .bl{color:var(--red)}
.bb-item .bt{color:var(--text2);font-weight:300}
.ws{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:1.5rem}
.ws .wl{font-size:0.72rem;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;gap:5px}
.ws .wr{padding:3px 10px;border-radius:4px;font-size:0.8rem;font-weight:700;text-transform:capitalize;background:var(--blueBg);color:var(--blue);border:1px solid rgba(41,121,255,0.2)}
.ws .wt{font-family:'Space Mono',monospace;font-size:0.85rem;font-weight:700;color:var(--text)}
.ws .wn{color:var(--text2);font-size:0.72rem}
.asc{margin-bottom:1rem}
.ac{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.2rem 1.5rem;margin-bottom:8px;transition:all 0.2s}
.ac:hover{border-color:var(--border2)}
.ach{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.5rem}
.acl{display:flex;align-items:center;gap:10px}
.acav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;border:2px solid var(--border);flex-shrink:0}
.acni{font-size:0.95rem;font-weight:700}
.acro{font-size:0.7rem;color:var(--text2);font-weight:300}
.acv{font-size:0.8rem;font-weight:700;padding:4px 12px;border-radius:6px}
.acv.b{background:var(--greenBg);color:var(--green);border:1px solid rgba(0,200,83,0.2)}
.acv.h{background:var(--yellowBg);color:var(--yellow);border:1px solid rgba(255,214,0,0.2)}
.acv.s{background:var(--redBg);color:var(--red);border:1px solid rgba(232,0,28,0.2)}
.acb{color:var(--text2);font-size:0.85rem;line-height:1.6;font-weight:300}
.acb strong{color:var(--text);font-weight:600}
.ps{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;text-align:center}
.ps h3{font-size:1rem;font-weight:700;margin-bottom:1rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.pv{display:flex;gap:12px;justify-content:center;margin-bottom:1rem}
.pvb{flex:1;padding:14px;border-radius:10px;background:var(--card2);border:1px solid var(--border)}
.pvb .pvc{font-size:2.2rem;font-weight:900;line-height:1}
.pvb .pvl{font-size:0.7rem;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.pvb.b .pvc{color:var(--green)}.pvb.h .pvc{color:var(--yellow)}.pvb.s .pvc{color:var(--red)}
.pf{padding-top:1rem;border-top:1px solid var(--border)}
.pf .fv{font-size:1.3rem;font-weight:800}
.pf .fv.buy{color:var(--green)}.pf .fv.hold{color:var(--yellow)}.pf .fv.sell{color:var(--red)}
.pf .fd{color:var(--text2);font-size:0.8rem;font-weight:300;margin-top:4px}
.error{display:none;background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:1.5rem;text-align:center;margin-top:1rem}
.error.active{display:block;animation:fu 0.3s ease}
.error .ei{font-size:2rem;margin-bottom:0.5rem}
.error .et{color:var(--text2);font-size:0.9rem;font-weight:300}
.footer{margin-top:3rem;text-align:center;padding:1.5rem 0}
.footer .fd{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin-bottom:1rem}
.footer p{color:var(--text2);font-size:0.7rem;font-weight:300;font-family:'Space Mono',monospace}
@media(max-width:640px){body{padding:1rem 0.75rem}.header h1{font-size:2rem}.search-box{flex-direction:column}.search-box button{padding:12px;width:100%}.th-t{flex-direction:column}.th-p{text-align:left;width:100%}.th-p .ch{justify-content:flex-start}.mg{grid-template-columns:repeat(2,1fr);gap:6px}.bb{grid-template-columns:1fr}.ws{gap:8px}}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <h1><span class="w">STOCK</span> <span class="g">DEBATE</span></h1>
  <div class="sub">6 legendary investors. 1 ticker. Live data.<span class="badge">SERVER</span></div>
</div>
<div class="search-wrap">
  <form class="search-box" onsubmit="event.preventDefault();runDebate()">
    <div class="iw"><span class="ic">&#x1F50D;</span>
      <input type="text" id="ti" placeholder="Search any ticker..." maxlength="8" autofocus>
    </div>
    <button type="submit" id="db">&#x2192; Debate</button>
  </form>
</div>
<div class="quick-wrap" id="qp"></div>
<div class="loading" id="ld"><div style="font-size:1.5rem">&#x1F4CA;</div><div class="lb"><div class="f"></div></div><div class="t">Fetching live data via API...</div></div>
<div class="result" id="r"></div>
<div class="error" id="er"><div class="ei">&#x26A0;&#xFE0F;</div><div class="et" id="ert"></div></div>
<div class="footer"><div class="fd"></div><p>Data via Yahoo Finance &#xB7; Not financial advice</p></div>
</div>
<script>

const Q=[
{t:'AAPL',c:'g'},{t:'MSFT',c:'b'},{t:'NVDA',c:'g'},{t:'GOOGL',c:'b'},{t:'AMZN',c:'y'},
{t:'META',c:'b'},{t:'TSLA',c:'r'},{t:'KO',c:'r'},{t:'JNJ',c:'g'},{t:'BRK.B',c:'y'}];
const MO={'AAPL':'Wide','MSFT':'Wide','GOOGL':'Wide','AMZN':'Wide','META':'Narrow','NVDA':'Wide','TSLA':'Narrow','KO':'Wide','PG':'Wide','JNJ':'Wide','V':'Wide','MA':'Wide','PEP':'Wide','CSCO':'Narrow','ABBV':'Wide','BRK.B':'Wide'};
const CC={'g':'#00c853','b':'#2979ff','y':'#ffd600','r':'#e8001c'};
document.getElementById('qp').innerHTML=Q.map(t=>'<button class="quick-pill" onclick="q(\''+t.t+'\')"><span class="d" style="background:'+CC[t.c]+'"></span>'+t.t+'</button>').join('');
function q(t){document.getElementById('ti').value=t;runDebate()}
function mo(t){return MO[t]||'Narrow'}
function fm(m){if(!m)return'N/A';const b=m/1e9;return b>1000?'$'+(b/1000).toFixed(2)+'T':'$'+b.toFixed(1)+'B'}
function fn(v){return typeof v==='number'?v:0}

async function runDebate(){
  const ti=document.getElementById('ti').value.trim().toUpperCase();
  if(!ti)return;
  document.getElementById('ld').classList.add('active');
  document.getElementById('r').classList.remove('active');
  document.getElementById('r').innerHTML='';
  document.getElementById('er').classList.remove('active');
  document.getElementById('db').disabled=true;
  try{
    const cr=await fetch('/api/stock?ticker='+encodeURIComponent(ti));
    if(!cr.ok)throw new Error(cr.status===404?'Ticker not found':'Server error');
    const j=await cr.json();
    if(j.error)throw new Error(j.error);
    D={t:ti,p:j.price,pc:j.prevClose||j.price,h52:j.high52||j.price*1.3,l52:j.low52||j.price*0.7,dc:j.dayChange.toFixed(2),pfh:j.pctFromHigh.toFixed(1),mc:j.mktCap,ex:j.exchange||'NASDAQ'};
    S=j.stats||{};
  }catch(e){
    document.getElementById('ert').textContent=e.message;
    document.getElementById('er').classList.add('active');
    document.getElementById('ld').classList.remove('active');
    document.getElementById('db').disabled=false;
    return;
  }
  document.getElementById('ld').classList.remove('active');
  document.getElementById('db').disabled=false;
  render(D,S);
}

function render(D,S){
  const p=D.p,fp=fn(S.fwdPe),peg=fn(S.peg),rv=fn(S.revGrowth),beta=fn(S.beta);
  const de=typeof S.de==='number'?S.de:(parseFloat(S.de)||0);
  const tm=S.targetMean,upside=tm?'('+(((tm-p)/p)*100).toFixed(0)+'%)':'';
  const up=parseFloat(D.dc)>=0;
  const fpe=S.fwdPeFmt||(fp?fp+'x':'---'),pp=S.pegFmt||(peg?peg.toFixed(2):'---');
  const rr=S.revGrowthFmt||(rv?rv+'%':'---'),bb=S.betaFmt||(beta?beta.toFixed(2):'---');

  const as=[
    {n:'Warren Buffett',r:'Value ~ Berkshire Hathaway',e:'\ud83c\udfe6',
     a: fp>30?D.t+' at '+fp+'x forward earnings fails my first screen. No margin of safety means no investment.':
       fp>20?D.t+' at '+fp+'x with a '+mo(D.t)+' moat and '+(S.roeFmt||'---')+' ROE is close. I like it but would wait for a pullback.':
       D.t+' at '+fp+'x with '+(S.roeFmt||'---')+' ROE checks every box. Genuine margin of safety in a quality business.',

     v:fp<20?'BUY':(fp<30?'HOLD':'SELL'),vc:fp<20?'b':(fp<30?'h':'s')},
    {n:'Michael Burry',r:'Contrarian ~ Scion',e:'\ud83d\udcc9',
     a:peg>3||peg===0?'PEG of '+(peg>0?peg.toFixed(2):'extreme')+' \u2014 market priced in perfection. Asymmetry is terrible. The crowd is always wrong at extremes.':
       peg>1.5?'PEG of '+peg.toFixed(2)+' is elevated. Good business, but price reflects optimism. I see risks the consensus ignores.':
       'PEG of '+peg.toFixed(2)+' with '+(S.gmFmt||'---')+' margins is reasonable. Not a screaming short.',
     v:peg>3?'SELL':(peg>1.5?'HOLD':'HOLD'),vc:peg>3?'s':'h'},
    {n:'Cathie Wood',r:'Growth ~ ARK Invest',e:'\ud83d\ude80',
     a:D.t+' is an innovation platform the market is mispricing. With '+(S.revGrowthFmt||rv+'%')+' revenue growth, the '+(fp>0?fp+'x':'')+' multiple will look cheap in 5 years.',
     v:'BUY',vc:'b'},
    {n:'Ray Dalio',r:'Macro ~ Bridgewater',e:'\u2696\ufe0f',
     a:'Beta of '+beta.toFixed(2)+' \u2014 '+(beta>1?'high-beta, outperforms in risk-on':'lower-beta, stable')+'. Size '+(beta>1.5?'at 1-2% on risk-parity':'at 3-5% as core')+'. Key risk: regime shift in rates.',
     v:beta<1.3?'BUY':'HOLD',vc:beta<1.3?'b':'h'},
    {n:'Peter Lynch',r:'GARP ~ Fidelity',e:'\ud83d\udcca',
     a:peg>2||peg===0?'PEG of '+(peg>0?peg.toFixed(2):'extreme')+' \u2014 overpaying for growth. Give me boring on a napkin.':
       peg<1?'PEG of '+peg.toFixed(2)+' is rare. '+(S.revGrowthFmt||rv+'%')+' growth below the P/E'+(S.dyFmt!=='None'?'. '+S.dyFmt+' dividend adds a kicker.':'. Reinvestment compounds.'):
       'PEG of '+peg.toFixed(2)+' is fine. '+(S.gmFmt||'---')+' margins and '+(S.fcfFmt||'---')+' \u2014 steady compounder.',
     v:peg<1.5?'BUY':(peg<3?'HOLD':'SELL'),vc:peg<1.5?'b':(peg<3?'h':'s')},
    {n:'Bill Ackman',r:'Activist ~ Pershing Sq',e:'\ud83c\udfaf',
     a:de>100?D.t+' has debt/equity of '+de+' \u2014 too leveraged. Push for deleveraging first.':
       D.t+' has clean balance sheet ('+de+' D/E) and '+(S.fcfFmt||'---')+' FCF. Significant value through buybacks.',
     v:fp<25&&de<60?'BUY':'HOLD',vc:fp<25&&de<60?'b':'h'}
  ];

  const vb=as.filter(a=>a.vc==='b').length,vs=as.filter(a=>a.vc==='s').length,vh=6-vb-vs;
  const fv=vb>=3?'BUY':(vs>=3?'SELL':'HOLD'),fc=vb>=3?'buy':(vs>=3?'sell':'hold');

  let h='<div class="th"><div class="th-t"><div class="th-l"><div class="th-tk">'+D.t+'<span class="m">'+mo(D.t)+' Moat</span></div><div class="th-d">'+new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})+' \u00b7 '+D.ex+'</div></div>';
  h+='<div class="th-p"><div class="pv">$'+D.p.toFixed(2)+'</div><div class="ch '+(up?'up':'down')+'">'+(up?'\u25b2':'\u25bc')+' '+Math.abs(parseFloat(D.dc)).toFixed(2)+'% today</div></div></div>';
  h+='<div class="th-m"><span class="th-mi">Market Cap: <strong>'+fm(D.mc)+'</strong></span><span class="th-mi">52W: <strong>$'+D.l52.toFixed(0)+' \u2014 $'+D.h52.toFixed(0)+'</strong></span><span class="th-mi">ATH: <strong>'+D.pfh+'%</strong></span></div></div>';
  h+='<div class="mg">';
  h+='<div class="mc"><div class="ml">Forward P/E</div><div class="mv">'+fpe+'</div></div>';
  h+='<div class="mc"><div class="ml">PEG Ratio</div><div class="mv">'+pp+'</div></div>';
  h+='<div class="mc"><div class="ml">Rev Growth</div><div class="mv g">'+rr+'</div></div>';
  h+='<div class="mc"><div class="ml">Free Cash Flow</div><div class="mv g">'+(S.fcfFmt||'---')+'</div></div>';
  h+='<div class="mc"><div class="ml">Gross Margin</div><div class="mv">'+(S.gmFmt||'---')+'</div></div>';
  h+='<div class="mc"><div class="ml">Div Yield</div><div class="mv y">'+(S.dyFmt||'None')+'</div></div>';
  h+='<div class="mc"><div class="ml">Debt/Equity</div><div class="mv">'+(S.de||'---')+'</div></div>';
  h+='<div class="mc"><div class="ml">Beta</div><div class="mv">'+bb+'</div></div></div>';

  // Bull/Bear
  h+='<div class="bb"><div class="bb-item bull"><div class="bl">Bull Case</div><div class="bt">'+D.t+' benefits from strong secular tailwinds and durable advantages. '+(S.gmFmt||'---')+' margins and '+(S.fcfFmt||'---')+' FCF provide flexibility.</div></div>';
  h+='<div class="bb-item bear"><div class="bl">Risk Factor</div><div class="bt">Valuation leaves limited room for error. Growth slowdown could trigger compression. Competition and regulatory risks are non-zero.</div></div></div>';

  // Wall St
  h+='<div class="ws"><span class="wl">Wall Street</span><span class="wr">'+(S.rec||'---')+'</span><span class="wt">Target: '+(tm?'$'+tm.toFixed(2):'N/A')+' '+upside+'</span><span class="wn">'+(S.numAnalysts||'---')+' analysts</span></div>';

  // Analysts
  h+='<div class="asc">';
  for(let a of as){
    h+='<div class="ac"><div class="ach"><div class="acl"><div class="acav">'+a.e+'</div><div><div class="acni">'+a.n+'</div><div class="acro">'+a.r+'</div></div></div><div class="acv '+a.vc+'">'+a.v+'</div></div><div class="acb">'+a.a+'</div></div>';
  }
  h+='</div>';

  // Panel Vote
  h+='<div class="ps"><h3>Panel Vote</h3><div class="pv"><div class="pvb b"><div class="pvc">'+vb+'</div><div class="pvl">BUY</div></div><div class="pvb h"><div class="pvc">'+vh+'</div><div class="pvl">HOLD</div></div><div class="pvb s"><div class="pvc">'+vs+'</div><div class="pvl">SELL</div></div></div>';
  h+='<div class="pf"><div class="fv '+fc+'">'+fv+'</div><div class="fd">'+vb+' of 6 recommend '+(vb>=3?'buy at $'+D.p.toFixed(2):(vs>=3?'sell at $'+D.p.toFixed(2):'hold at $'+D.p.toFixed(2)))+'</div></div></div>';

  document.getElementById('r').innerHTML=h;
  document.getElementById('r').classList.add('active');
}
document.getElementById('ti').addEventListener('keypress',function(e){if(e.key==='Enter')runDebate()});

</script>
</body>
</html>
